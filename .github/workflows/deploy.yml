name: Azure Infrastructure Deployment

# This triggers the workflow every time you 'git push' to the main branch
on:
  push:
    branches: [ main ]

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the code from your GitHub repo onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Login to Azure using the AZURE_CREDENTIALS secret
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Explicitly set the subscription context
      - name: Set Azure Subscription
        run: |
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

    # 4. Create the Resource Group
      - name: Create Resource Group
        run: |
          # Moving to North Europe for maximum stability
          az group create --name rg-notifications-prod --location northeurope

      # 5. Deploy the Bicep template (The "Blueprint")
      - name: Deploy Bicep Template
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-notifications-prod
          template: ./main.bicep
          # FIX: This unique name prevents the "DeploymentActive" lock error
          deploymentName: 'deploy-${{ github.run_id }}-${{ github.run_number }}'
          failOnStdErr: false